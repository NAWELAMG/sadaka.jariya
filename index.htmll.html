<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية - أذكار وتسبيح</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-rose: #fff0f0; 
            --red-title: #d32f2f; 
            --glass: rgba(255, 255, 255, 0.8);
        }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(135deg, #ffe4e1 0%, #fff5f5 100%); 
            margin: 0; padding: 15px; text-align: center; color: #333;
            min-height: 100vh;
        }
        .container { 
            max-width: 500px; margin: auto; background: white; padding: 25px; 
            border-radius: 30px; box-shadow: 0 15px 35px rgba(211, 47, 47, 0.1); 
        }
        
        h3, .basmala, .surah-title { color: var(--red-title); font-weight: bold; margin-bottom: 15px; }

        .name-section { 
            background: #fffafa; padding: 20px; border-radius: 20px; 
            margin-bottom: 25px; border: 1px solid #ffccd5; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }
        input { 
            padding: 12px; border-radius: 12px; border: 1px solid #ddd; 
            width: 70%; margin-bottom: 10px; font-size: 1rem; outline: none;
        }
        input:focus { border-color: var(--red-title); }
        
        .tabs-nav { 
            display: flex; overflow-x: auto; gap: 10px; margin-bottom: 25px; 
            padding: 10px 5px; scrollbar-width: none;
        }
        .tab-btn { 
            flex: 0 0 auto; padding: 12px 20px; border: none; 
            background: #fff; border: 1px solid #fce4ec; border-radius: 50px; 
            cursor: pointer; color: #880e4f; font-weight: 600; transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .tab-btn.active { background: var(--red-title); color: white; border-color: var(--red-title); transform: translateY(-2px); }

        .counter-btn { 
            width: 220px; height: 220px; border-radius: 50%; 
            background: white; color: var(--red-title); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            margin: 25px auto; border: 10px solid var(--red-title); cursor: pointer; 
            transition: 0.1s; position: relative;
            box-shadow: 0 10px 25px rgba(211, 47, 47, 0.2);
        }
        .counter-btn:active { transform: scale(0.92); background: #fff5f5; }
        .num-txt { font-size: 3.5rem; font-weight: 900; line-height: 1; }
        
        .quran-box { 
            display: none; text-align: center; background: #fffafa; padding: 25px; 
            border-radius: 20px; line-height: 2.5; font-size: 1.3rem; 
            border: 1px solid #ffe4e1; max-height: 500px; overflow-y: auto;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
        }

        .share-section { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .share-btn {
            background: #25D366; color: white; padding: 12px 25px; border: none;
            border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; font-size: 1.1rem; transition: 0.3s;
        }
        .share-btn:hover { background: #128C7E; transform: translateY(-2px); }

        /* ميزة الوضع الليلي الخفيف */
        .mode-toggle { font-size: 0.8rem; color: #999; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="name-section">
        <h3>صدقة جارية</h3>
        <input type="text" id="name-input" placeholder="اكتب اسم المرحوم/ة هنا">
        <button onclick="updateName()" style="padding: 12px 20px; background: var(--red-title); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold;">حفظ</button>
        <p id="name-display" style="margin-top:10px; font-size: 1.2rem; color: #444;"></p>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab('tasbih', this)"><i class="fas fa-hand-holding-heart"></i> المسبحة</button>
        <button class="tab-btn" onclick="switchTab('fatiha', this)">الفاتحة</button>
        <button class="tab-btn" onclick="switchTab('kursi', this)">الكرسي</button>
        <button class="tab-btn" onclick="switchTab('m3widat', this)">المعوذات</button>
        <button class="tab-btn" onclick="switchTab('duaa', this)">أدعية</button>
    </div>

    <div id="tasbih-div">
        <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
            <select id="dhikr-select" onchange="resetCnt()" style="padding:10px; border-radius:10px; border: 1.5px solid var(--red-title); flex: 1;">
                <option value="سبحان الله">سبحان الله</option>
                <option value="الحمد لله">الحمد لله</option>
                <option value="الله أكبر">الله أكبر</option>
                <option value="لا إله إلا الله">لا إله إلا الله</option>
                <option value="اللهم صلِ على محمد">اللهم صلِ على محمد</option>
            </select>
            <select id="target-count" style="padding:10px; border-radius:10px; border: 1px solid #ddd;">
                <option value="0">بدون هدف</option>
                <option value="33">25 مرة</option>
                <option value="33">33 مرة</option>
                <option value="100">100 مرة</option>
            </select>
        </div>

        <div class="counter-btn" onclick="doTasbih()">
            <span id="label-text" style="font-size: 1.2rem; opacity: 0.8; margin-bottom: 5px;">اضغط هنا</span>
            <span class="num-txt" id="cnt-val">0</span>
            <span id="current-dhikr" style="margin-top: 10px; font-weight: bold;">سبحان الله</span>
        </div>
        
        <button onclick="resetCnt()" style="background: none; border: none; color: #999; cursor: pointer; text-decoration: underline; font-size: 0.9rem;">إعادة العداد</button>
    </div>

    <div id="quran-div" class="quran-box"></div>

    <div class="share-section">
        <button onclick="shareWebsite()" class="share-btn">
            <i class="fab fa-whatsapp"></i> انشر الموقع واكسب الأجر
        </button>
        <div class="mode-toggle" onclick="toggleTheme()">تبديل المظهر (ليلي/نهاري)</div>
    </div>
</div>

<script>
    let counter = 0;
    // إضافة صوت خفيف عند الضغط (اختياري)
    const clickSound = new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3');

    const quran = {
        fatiha: "<span class='basmala'>بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</span><br>الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ (2) الرَّحْمَنِ الرَّحِيمِ (3) مَالِكِ يَوْمِ الدِّينِ (4) إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ (5) اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ (6) صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ (7)",
        kursi: "<span class='basmala'>بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</span><br>اللَّهُ لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ مَنْ ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلَّا بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خلفهُمْ وَلَا يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلَّا بِمَا شَاءَ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ وَلَا يَئُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ",
        m3widat: `
            <span class="surah-title">سورة الإخلاص</span><br><span class='basmala'>بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</span><br>قُلْ هُوَ اللَّهُ أَحَدٌ (1) اللَّهُ الصَّمَدُ (2) لَمْ يَلِدْ وَلَمْ يُولَدْ (3) وَلَمْ يَكُنْ لَهُ كُفُوًا أَحَدٌ (4)<br>
            <span class="surah-title">سورة الفلق</span><br><span class='basmala'>بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</span><br>قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ (1) مِنْ شَرِّ مَا خَلَقَ (2) وَمِنْ شَرِّ غَاسِقٍ إِذَا وَقَبَ (3) وَمِنْ شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ (4) وَمِنْ شَرِّ حَاسِدٍ إِذَا حَسَدَ (5)<br>
            <span class="surah-title">سورة الناس</span><br><span class='basmala'>بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</span><br>قُلْ أَعُوذُ بِرَبِّ النَّاسِ (1) مَلِكِ النَّاسِ (2) إِلَهِ النَّاسِ (3) مِنْ شَرِّ الْوَسْوَاسِ الْخَنَّاسِ (4) الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ (5) مِنَ الْجِنَّةِ وَالنَّاسِ (6)
        `,
        duaa: `
            <span class="surah-title">أدعية للمتوفى</span><br>
            - اللهم اغفر له وارحمه، وأكرم نزله، ووسع مدخله.<br>
            - اللهم آته برحمتك ورضاك، وقهِ فتنة القبر وعذابه.<br>
            - اللهم اجعله في بطن القبر مطمئناً.<br>
            - اللهم اجعل قبره روضة من رياض الجنة.<br>
            - اللهم اغفر لجميع موتى المسلمين.
        `
    };

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(id === 'tasbih') {
            document.getElementById('tasbih-div').style.display = 'block';
            document.getElementById('quran-div').style.display = 'none';
        } else {
            document.getElementById('tasbih-div').style.display = 'none';
            document.getElementById('quran-div').style.display = 'block';
            document.getElementById('quran-div').innerHTML = quran[id];
            document.getElementById('quran-div').scrollTop = 0;
        }
    }

    function doTasbih() {
        counter++;
        document.getElementById('cnt-val').innerText = counter;
        let selectedDhikr = document.getElementById('dhikr-select').value;
        document.getElementById('current-dhikr').innerText = selectedDhikr;
        
        let goal = parseInt(document.getElementById('target-count').value);
        if(goal > 0 && counter === goal) {
            if ("vibrate" in navigator) navigator.vibrate(200); // اهتزاز بسيط
            alert("تقبل الله، أكملت الورد.");
        }
    }

    function resetCnt() { 
        counter = 0; 
        document.getElementById('cnt-val').innerText = 0; 
    }

    function updateName() {
        let val = document.getElementById('name-input').value;
        if(val) document.getElementById('name-display').innerText = "صدقة جارية لروح: " + val;
    }

    function shareWebsite() {
        const url = window.location.href;
        const text = encodeURIComponent("صدقة جارية.. ساهم في التسبيح وقراءة الأذكار من خلال هذا الرابط: " + url);
        window.open("https://api.whatsapp.com/send?text=" + text, "_blank");
    }

    function toggleTheme() {
        const body = document.body;
        if(body.style.filter === 'invert(0.9)') {
            body.style.filter = 'invert(0)';
        } else {
            body.style.filter = 'invert(0.9)';
        }
    }
</script>
</body>
</html>
