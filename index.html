<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية</title>
    <style>
        :root { 
            --bg-rose: #ffe4e1; 
            --red-title: #d32f2f; 
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-rose); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        h3, .basmala, .surah-title { color: var(--red-title); font-weight: bold; }

        .name-section { background: #fff5f7; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #ffccd5; }
        input { padding: 10px; border-radius: 8px; border: 1px solid #ddd; width: 60%; margin-bottom: 5px; }
        
        .tabs-nav { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 20px; padding: 5px; scrollbar-width: none; }
        .tab-btn { flex: 0 0 auto; padding: 10px 18px; border: none; background: #fce4ec; border-radius: 20px; cursor: pointer; color: #880e4f; font-weight: 500; }
        .tab-btn.active { background: var(--red-title); color: white; }

        .counter-btn { 
            width: 200px; height: 200px; border-radius: 50%; 
            background: white; color: var(--red-title); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            margin: 20px auto; border: 8px solid var(--red-title); cursor: pointer; transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .counter-btn:active { transform: scale(0.95); }
        .num-txt { font-size: 3.2rem; font-weight: bold; }

        .quran-box { 
            display: none; text-align: center; background: #fffafa; padding: 20px; 
            border-radius: 15px; line-height: 2.2; font-size: 1.2rem; border: 1px solid #ffe4e1;
            max-height: 450px; overflow-y: auto; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="name-section">
        <h3>صدقة جارية</h3>
        <input type="text" id="name-input" placeholder="اسم المرحوم/ة">
        <button onclick="updateName()" style="padding: 8px 15px; background: var(--red-title); color: white; border: none; border-radius: 8px; cursor: pointer;">حفظ</button>
        <p id="name-display" style="margin-top:10px; font-weight: bold;"></p>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab('tasbih', this)">المسبحة</button>
        <button class="tab-btn" onclick="switchTab('fatiha', this)">الفاتحة</button>
        <button class="tab-btn" onclick="switchTab('kursi', this)">آية الكرسي</button>
        <button class="tab-btn" onclick="switchTab('m3widat', this)">المعوذات</button>
        <button class="tab-btn" onclick="switchTab('duaa', this)">أدعية للميت</button>
    </div>

    <div id="tasbih-div">
        <div style="margin-bottom: 15px;">
            <select id="dhikr-select" style="padding:8px; border-radius:8px; border: 1px solid var(--red-title);">
                <option value="سبحان الله">سبحان الله</option>
                <option value="الحمد لله">الحمد لله</option>
                <option value="الله أكبر">الله أكبر</option>
                <option value="لا إله إلا الله">لا إله إلا الله</option>
            </select>
            <select id="target-count" style="padding:8px; border-radius:8px; margin-right: 5px;">
                <option value="0">بدون هدف</option>
                <option value="33">33 مرة</option>
                <option value="100">100 مرة</option>
            </select>
        </div>

        <div class="counter-btn" onclick="doTasbih()">
            <span id="label-text" style="font-size: 1.3rem; font-weight: bold;">سبحان الله</span>
            <span class="num-txt" id="cnt-val">0</span>
        </div>
        <button onclick="resetCnt()" style="background: none; border: none; color: gray; cursor: pointer; text-decoration: underline;">إعادة العداد</button>
    </div>

    <div id="quran-div" class="quran-box"></div>
</div>

<script>
    let counter = 0;
    const quran = {
        fatiha: "<span class='basmala'>بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</span><br>الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ (2) الرَّحْمَنِ الرَّحِيمِ (3) مَالِكِ يَوْمِ الدِّينِ (4) إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ (5) اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ (6) صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ (7)",
        kursi: "<span class='basmala'>بِسْم. اللَّهِ الرَّحْمَنِ الرَّحِيمِ</span><br>اللَّهُ لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ مَنْ ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلَّا بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خلفهُمْ وَلَا يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلَّا بِمَا شَاءَ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ وَلَا يَئُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ",
        m3widat: `
            <span class="surah-title">سورة الإخلاص</span><br><span class='basmala'>بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</span><br>قُلْ هُوَ اللَّهُ أَحَدٌ (1) اللَّهُ الصَّمَدُ (2) لَمْ يَلِدْ وَلَمْ يُولَدْ (3) وَلَمْ يَكُنْ لَهُ كُفُوًا أَحَدٌ (4)<br>
            <span class="surah-title">سورة الفلق</span><br><span class='basmala'>بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</span><br>قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ (1) مِنْ شَرِّ مَا خَلَقَ (2) وَمِنْ شَرِّ غَاسِقٍ إِذَا وَقَبَ (3) وَمِنْ شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ (4) وَمِنْ شَرِّ حَاسِدٍ إِذَا حَسَدَ (5)<br>
            <span class="surah-title">سورة الناس</span><br><span class='basmala'>بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</span><br>قُلْ أَعُوذُ بِرَبِّ النَّاسِ (1) مَلِكِ النَّاسِ (2) إِلَهِ النَّاسِ (3) مِنْ شَرِّ الْوَسْوَاسِ الْخَنَّاسِ (4) الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ (5) مِنَ الْجِنَّةِ وَالنَّاسِ (6)
        `,
        duaa: `
            <span class="surah-title">أدعية للمتوفى</span><br>
            - اللهم اغفر له وارحمه، وعافه واعف عنه، وأكرم نزله، ووسع مدخله.<br>
            - اللهم آته برحمتك ورضاك، وقهِ فتنة القبر وعذابه.<br>
            - اللهم إن كان محسناً فزد في إحسانه، وإن كان مسيئاً فتجاوز عن سيئاته.<br>
            - اللهم اجعل قبره روضة من رياض الجنة.
        `
    };

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(id === 'tasbih') {
            document.getElementById('tasbih-div').style.display = 'block';
            document.getElementById('quran-div').style.display = 'none';
        } else {
            document.getElementById('tasbih-div').style.display = 'none';
            document.getElementById('quran-div').style.display = 'block';
            document.getElementById('quran-div').innerHTML = quran[id];
        }
    }

    function doTasbih() {
        counter++;
        document.getElementById('cnt-val').innerText = counter;
        document.getElementById('label-text').innerText = document.getElementById('dhikr-select').value;
        let goal = parseInt(document.getElementById('target-count').value);
        if(goal > 0 && counter === goal) alert("تقبل الله.");
    }

    function resetCnt() { counter = 0; document.getElementById('cnt-val').innerText = 0; }

    function updateName() {
        let val = document.getElementById('name-input').value;
        if(val) document.getElementById('name-display').innerText = "صدقة جارية لروح: " + val;
    }
</script>
</body>
</html>
